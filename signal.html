<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MATRIX DOOM TERMINAL</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

body {
  background: #000;
  min-height: 100vh;
  font-family: 'Courier New', 'Fira Code', monospace;
  overflow: hidden;
  position: relative;
}

#matrixCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  opacity: 0.3;
}

.terminal-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(2px);
  transition: opacity 0.5s ease;
}

.terminal-box {
  border: 2px solid #0f0;
  border-radius: 12px;
  padding: 2rem;
  width: 90%;
  max-width: 750px;
  background: rgba(0, 0, 0, 0.9);
  box-shadow: 0 0 30px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1);
}

.terminal-text {
  color: #0f0;
  font-size: clamp(0.9rem, 4vw, 1.2rem);
  line-height: 1.8;
  text-shadow: 0 0 5px #0f0;
}

.terminal-line {
  margin-bottom: 0.75rem;
  white-space: pre-wrap;
  word-break: break-word;
}

.blink-prompt {
  margin-top: 1.5rem;
  text-align: center;
  font-weight: bold;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; text-shadow: 0 0 2px #0f0; }
  50% { opacity: 1; text-shadow: 0 0 10px #0f0; }
}

.doom-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 20;
  background: #000;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.doom-canvas {
  width: 100%;
  height: auto;
  max-height: 100vh;
  border: 3px solid #0f0;
  box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
  background: #000;
}

.loading-status {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #0f0;
  font-family: monospace;
  font-size: 0.9rem;
  background: rgba(0, 0, 0, 0.8);
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid #0f0;
  z-index: 30;
  text-align: center;
  white-space: nowrap;
}

.error-message {
  color: #f00;
  border-color: #f00;
  text-shadow: 0 0 5px #f00;
}

@media (max-width: 768px) {
  .terminal-box {
    padding: 1.2rem;
    width: 95%;
  }
  .loading-status {
    font-size: 0.7rem;
    white-space: normal;
    max-width: 90%;
    bottom: 10px;
  }
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div id="terminalContainer" class="terminal-container">
  <div class="terminal-box">
    <div id="terminalLines" class="terminal-text"></div>
    <div id="enterPrompt" class="blink-prompt" style="display: none;">[ PRESS ENTER TO JACK IN ]</div>
  </div>
</div>

<div id="doomWrapper" class="doom-wrapper">
  <canvas id="doomCanvas" class="doom-canvas"></canvas>
  <div id="loadingStatus" class="loading-status">Initializing DOOM engine...</div>
</div>

<script>
(function(){
  // Matrix Rain Animation
  const matrixCanvas = document.getElementById('matrixCanvas');
  let ctx = matrixCanvas.getContext('2d');
  let matrixColumns = [];
  let matrixAnimation;

  function initMatrixRain() {
    const resizeMatrix = () => {
      matrixCanvas.width = window.innerWidth;
      matrixCanvas.height = window.innerHeight;
      
      const fontSize = 16;
      const columns = Math.floor(matrixCanvas.width / fontSize);
      matrixColumns = Array(columns).fill(1);
    };
    
    resizeMatrix();
    window.addEventListener('resize', resizeMatrix);
    
    const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
    
    function drawMatrix() {
      if (!ctx) return;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
      
      ctx.fillStyle = '#0f0';
      ctx.font = '16px monospace';
      
      for (let i = 0; i < matrixColumns.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const x = i * 16;
        const y = matrixColumns[i] * 16;
        ctx.fillText(char, x, y);
        
        if (y > matrixCanvas.height && Math.random() > 0.975) {
          matrixColumns[i] = 1;
        } else {
          matrixColumns[i]++;
        }
      }
      
      matrixAnimation = requestAnimationFrame(drawMatrix);
    }
    
    drawMatrix();
  }
  
  initMatrixRain();
  
  // Terminal boot sequence
  const terminalLines = document.getElementById('terminalLines');
  const enterPrompt = document.getElementById('enterPrompt');
  const terminalContainer = document.getElementById('terminalContainer');
  const doomWrapper = document.getElementById('doomWrapper');
  const loadingStatus = document.getElementById('loadingStatus');
  
  const bootMessages = [
    "> INITIALIZING ONN TERMINAL...",
    "> CONNECTING TO MATRIX...",
    "> DECRYPTING SECURE CHANNEL...",
    "> BYPASSING FIREWALL...",
    "> ACCESS GRANTED."
  ];
  
  let msgIndex = 0;
  let charIndex = 0;
  let currentLine = null;
  
  function typeNextMessage() {
    if (msgIndex >= bootMessages.length) {
      enterPrompt.style.display = 'block';
      return;
    }
    
    if (currentLine) {
      terminalLines.appendChild(currentLine);
    }
    
    currentLine = document.createElement('div');
    currentLine.className = 'terminal-line';
    currentLine.textContent = '';
    charIndex = 0;
    
    function typeChar() {
      if (charIndex < bootMessages[msgIndex].length) {
        currentLine.textContent += bootMessages[msgIndex][charIndex];
        charIndex++;
        setTimeout(typeChar, 30 + Math.random() * 20);
      } else {
        msgIndex++;
        setTimeout(typeNextMessage, 200);
      }
    }
    
    typeChar();
  }
  
  typeNextMessage();
  
  // WAD Configuration - Use jsDelivr CDN for Freedoom
  const WAD_URL = 'https://cdn.jsdelivr.net/gh/freedoom/freedoom@master/freedoom1.wad';
  const WAD_FILENAME = 'freedoom.wad';
  
  let doomStarted = false;
  
  function startDoom() {
    if (doomStarted) return;
    doomStarted = true;
    
    // Hide terminal with fade
    terminalContainer.style.opacity = '0';
    setTimeout(() => {
      terminalContainer.style.display = 'none';
      doomWrapper.style.display = 'flex';
    }, 500);
    
    loadingStatus.textContent = 'Downloading Freedoom WAD...';
    
    const canvas = document.getElementById('doomCanvas');
    
    // Fetch WAD and preload into Emscripten FS
    fetch(WAD_URL)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Failed to fetch WAD: ${response.status}`);
        }
        loadingStatus.textContent = `Downloading WAD (${Math.round(response.headers.get('content-length') / 1024 / 1024)}MB)...`;
        return response.arrayBuffer();
      })
      .then(wadData => {
        loadingStatus.textContent = 'Loading WAD into filesystem...';
        
        // Setup Module BEFORE loading doom.js
        window.Module = window.Module || {};
        window.Module.canvas = canvas;
        window.Module.arguments = ['-iwad', WAD_FILENAME];
        window.Module.print = function(text) {
          console.log('[DOOM]', text);
          if (text.includes('Started')) {
            loadingStatus.textContent = 'DOOM running!';
            setTimeout(() => {
              if (loadingStatus) loadingStatus.style.opacity = '0';
            }, 3000);
          }
        };
        window.Module.printErr = function(text) {
          console.error('[DOOM ERR]', text);
          if (text.includes('failed') || text.includes('error')) {
            loadingStatus.textContent = 'Error: ' + text.substring(0, 60);
            loadingStatus.classList.add('error-message');
          }
        };
        window.Module.setStatus = function(text) {
          if (text && text !== '') {
            loadingStatus.textContent = text;
            console.log('[STATUS]', text);
          }
        };
        window.Module.monitorRunDependencies = function(left) {
          if (left === 0) {
            console.log('All dependencies loaded, DOOM starting');
          }
        };
        
        // Preload file into virtual filesystem
        window.Module.preRun = window.Module.preRun || [];
        window.Module.preRun.push(function() {
          if (!window.Module.FS) {
            loadingStatus.textContent = 'ERROR: FS not available';
            return;
          }
          
          try {
            const wadDataArray = new Uint8Array(wadData);
            window.Module.FS_createDataFile('/', WAD_FILENAME, wadDataArray, true, true, true);
            loadingStatus.textContent = 'WAD loaded, starting DOOM...';
            console.log(`Loaded ${WAD_FILENAME} (${wadDataArray.length} bytes) into FS`);
          } catch (err) {
            console.error('FS preload error:', err);
            loadingStatus.textContent = 'Failed to load WAD into filesystem';
            loadingStatus.classList.add('error-message');
          }
        });
        
        // Load doom.js
        const script = document.createElement('script');
        script.src = 'doom.js';
        script.onerror = function() {
          loadingStatus.textContent = 'ERROR: Failed to load doom.js';
          loadingStatus.classList.add('error-message');
          console.error('Failed to load doom.js - make sure doom.js and doom.wasm exist');
        };
        document.body.appendChild(script);
      })
      .catch(error => {
        console.error('WAD download failed:', error);
        loadingStatus.textContent = `ERROR: Cannot load Freedoom WAD from CDN`;
        loadingStatus.classList.add('error-message');
        
        // Retry with alternative CDN
        loadingStatus.textContent = 'Retrying with alternative CDN...';
        fetch('https://cdn.jsdelivr.net/gh/freedoom/freedoom@master/freedoom2.wad')
          .then(response => {
            if (!response.ok) throw new Error('Alternative WAD also failed');
            return response.arrayBuffer();
          })
          .then(altWadData => {
            loadingStatus.textContent = 'Alternative WAD loaded, retrying...';
            const altArray = new Uint8Array(altWadData);
            if (window.Module && window.Module.FS) {
              window.Module.FS_createDataFile('/', WAD_FILENAME, altArray, true, true, true);
            }
          })
          .catch(finalError => {
            console.error('All WAD sources failed');
          });
      });
  }
  
  // Handle Enter key or tap on prompt
  function handleStart() {
    if (!doomStarted) {
      startDoom();
    }
  }
  
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && terminalContainer.style.display !== 'none') {
      e.preventDefault();
      handleStart();
    }
  });
  
  enterPrompt.addEventListener('click', handleStart);
  
  // Touch support for mobile
  enterPrompt.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleStart();
  });
  
  // Resize canvas when window changes
  window.addEventListener('resize', () => {
    const canvas = document.getElementById('doomCanvas');
    if (canvas && doomWrapper.style.display === 'flex') {
      canvas.style.width = '100%';
      canvas.style.height = 'auto';
    }
  });
  
  console.log('Matrix DOOM Terminal ready - Press ENTER to start');
})();
</script>
</body>
</html>
