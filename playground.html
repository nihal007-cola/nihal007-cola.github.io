<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Race</title>

<style>
body {
  margin:0;
  background:#000;
  color:#0f0;
  font-family: monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Back button */
.topbar {
  width:100%;
  padding:10px;
}
.back {
  color:#0f0;
  text-decoration:none;
  border:1px solid #0f0;
  padding:6px 12px;
  border-radius:10px;
}

/* Screen */
canvas {
  margin-top:10px;
  background:#001100;
  border:4px solid #0f0;
  box-shadow:0 0 20px #0f0;
}

/* Controls */
.controls {
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,80px);
  gap:10px;
}

button {
  height:60px;
  background:#000;
  color:#0f0;
  border:2px solid #0f0;
  border-radius:10px;
  font-size:18px;
}

button:active {
  background:#0f0;
  color:#000;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="toys.html" class="back">← BACK</a>
</div>

<canvas id="game" width="240" height="400"></canvas>

<div class="controls">
  <button data-key="left">←</button>
  <button data-key="up">↑</button>
  <button data-key="right">→</button>
  <button data-key="left">←</button>
  <button data-key="down">↓</button>
  <button data-key="right">→</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

let input = {left:false,right:false,up:false,down:false};

document.addEventListener("keydown",e=>{
  if(["ArrowLeft","KeyA"].includes(e.code)) input.left=true;
  if(["ArrowRight","KeyD"].includes(e.code)) input.right=true;
  if(["ArrowUp","KeyW"].includes(e.code)) input.up=true;
  if(["ArrowDown","KeyS"].includes(e.code)) input.down=true;
  e.preventDefault();
});

document.addEventListener("keyup",e=>{
  if(["ArrowLeft","KeyA"].includes(e.code)) input.left=false;
  if(["ArrowRight","KeyD"].includes(e.code)) input.right=false;
  if(["ArrowUp","KeyW"].includes(e.code)) input.up=false;
  if(["ArrowDown","KeyS"].includes(e.code)) input.down=false;
});

document.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("touchstart",()=>input[btn.dataset.key]=true);
  btn.addEventListener("touchend",()=>input[btn.dataset.key]=false);
  btn.addEventListener("mousedown",()=>input[btn.dataset.key]=true);
  btn.addEventListener("mouseup",()=>input[btn.dataset.key]=false);
});

let player = {x:120,y:340,w:20,h:30};
let enemies = [];
let speed = 2;
let score = 0;

function spawnEnemy(){
  enemies.push({
    x:Math.random()*200,
    y:-40,
    w:20,
    h:30
  });
}

function update(){
  if(input.left) player.x -= 4;
  if(input.right) player.x += 4;

  player.x = Math.max(0, Math.min(W-20, player.x));

  if(Math.random()<0.03) spawnEnemy();

  enemies.forEach(e=> e.y += speed);

  enemies = enemies.filter(e=>{
    if(e.y > H) return false;

    // collision
    if(
      player.x < e.x + e.w &&
      player.x + player.w > e.x &&
      player.y < e.y + e.h &&
      player.y + player.h > e.y
    ){
      alert("GAME OVER\nScore: "+score);
      location.reload();
    }

    return true;
  });

  score++;
}

function drawMatrixBackground(){
  ctx.fillStyle = "rgba(0,20,0,0.3)";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="#0f0";
  for(let i=0;i<20;i++){
    ctx.fillText(
      Math.random()>0.5?"1":"0",
      Math.random()*W,
      Math.random()*H
    );
  }
}

function draw(){
  drawMatrixBackground();

  // player
  ctx.fillStyle="#0f0";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // enemies
  enemies.forEach(e=>{
    ctx.fillStyle="#0f0";
    ctx.fillRect(e.x,e.y,e.w,e.h);
  });

  // score
  ctx.fillText("SCORE:"+score,10,20);
}

let last=0;
function loop(t){
  if(t-last>16){
    update();
    draw();
    last=t;
  }
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
