  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: black;
      color: #00ff88;
      font-family: monospace;
      overflow-x: hidden;

    canvas {

    /* center glow */
    body::after {
      content: "";

      inset: 0;
      background: radial-gradient(circle at center, rgba(0,255,136,0.08), transparent 70%);

      z-index: 1;
    }

    /* HEADER */
    .sticky-header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid #00ff88;
    }

    .header {
      max-width: 1100px;
      margin: auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { width: 90px; }

    .header-text {
      text-shadow: 0 0 6px #00ff88;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-buttons {
      display: flex;
      gap: 10px;
    }

    .header-buttons a {
      border: 1px solid #00ff88;
      padding: 6px 10px;
      text-decoration: none;
      color: #00ff88;

    }

    /* MAIN PANEL */

      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 110px auto 40px;
      padding: 20px;

      background: rgba(0,0,0,0.35);
      border: 1px solid #00ff88;

      box-shadow:
        0 0 25px #00ff88,
        inset 0 0 25px rgba(0,255,136,0.15);

      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px);

      border-radius: 6px;
    }

    #dynamic-terminal {
      min-height: 160px;
      line-height: 1.5;
      text-shadow: 0 0 6px #00ff88;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 70px;
      border: 1px solid #00ff88;
      margin: 10px 0;
      text-align: center;
      line-height: 70px;
      text-decoration: none;
      color: #00ff88;
      transition: 0.2s;
    }

    .btn:hover {
      box-shadow: 0 0 20px #00ff88, 0 0 35px #00ff88;
      transform: scale(1.02);
    }

    .section-title {

    }

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const letters = "01ONNWORKLAB";
const fontSize = 10;
let columns = Math.floor(window.innerWidth / fontSize);
let drops = Array(columns).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";
  ctx.shadowColor = "#00ff88";
  ctx.shadowBlur = 12;

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}
setInterval(draw, 25);

/* TERMINAL */
const terminal = document.getElementById("dynamic-terminal");

const lines = [
  "booting onnwork lab...",
  "systems running...",
  "location: kolkata",
  "status: building"
];

function typeLine(text, i=0){
  if(i===0){
    const div=document.createElement("div");
    terminal.appendChild(div);
    let j=0;
    function type(){
      if(j<text.length){
        div.textContent+=text[j++];
        setTimeout(type,30);
      }
    }
    type();
  }
}

(async()=>{
  for(let l of lines){
    typeLine(l);
    await new Promise(r=>setTimeout(r,400));
  }
})();
</script>
