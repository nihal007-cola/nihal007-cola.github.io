<!DOCTYPE html>
<html>
<head>
  <title>ONN LOGO ENGINE</title>
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.15;
    }

    .wrapper {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    .left {
      flex: 2;
      display: flex;
      flex-direction: column;
    }

    .console {
      flex: 1;
      border: 1px solid rgba(0,255,100,0.3);
      padding: 15px;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(0,255,100,0.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .line {
      font-size: 13px;
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    input {
      margin-top: auto;
      padding: 12px;
      background: black;
      border: 1px solid #33ff99;
      color: #33ff99;
      font-family: monospace;
      outline: none;
    }

    .right {
      flex: 1;
      border: 1px solid rgba(0,255,100,0.3);
      padding: 15px;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(0,255,100,0.1);
      overflow-y: auto;
    }

    .hint {
      font-size: 13px;
      margin-bottom: 10px;
      border-left: 2px solid #33ff99;
      padding-left: 8px;
      opacity: 0.85;
    }

    a {
      color: #33ff99;
      text-decoration: none;
      margin-bottom: 10px;
      display: inline-block;
    }

    @media(max-width:800px){
      .wrapper{flex-direction:column;}
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="wrapper">

  <div class="left">
    <a href="toys.html">← BACK</a>
    <h2>> ONN LOGO ENGINE</h2>

    <div class="console" id="console"></div>
    <input id="cmd" placeholder="fd 100 | rt 90 | repeat 4 [fd 100 rt 90]" autofocus>
  </div>

  <div class="right">
    <div class="hint">fd 100 → forward</div>
    <div class="hint">bk 50 → backward</div>
    <div class="hint">rt 90 → turn right</div>
    <div class="hint">lt 90 → turn left</div>
    <div class="hint">pu / pd → pen up/down</div>
    <div class="hint">home → reset position</div>
    <div class="hint">clear → clear screen</div>
    <div class="hint">repeat 4 [fd 100 rt 90]</div>
  </div>

</div>

<script>
// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// TURTLE STATE
let x = canvas.width / 2;
let y = canvas.height / 2;
let angle = 0;
let pen = true;

ctx.strokeStyle = "#00ff88";
ctx.lineWidth = 2;

// CONSOLE
const input = document.getElementById("cmd");
const consoleBox = document.getElementById("console");

function addLine(text){
  const div = document.createElement("div");
  div.className = "line";
  div.textContent = text;
  consoleBox.appendChild(div);
  consoleBox.scrollTop = consoleBox.scrollHeight;
}

// TURTLE FUNCTIONS
function move(dist){
  const rad = angle * Math.PI / 180;
  const nx = x + Math.cos(rad) * dist;
  const ny = y + Math.sin(rad) * dist;

  if(pen){
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(nx, ny);
    ctx.stroke();
  }

  x = nx;
  y = ny;
}

function executeCommand(cmd){
  const parts = cmd.split(" ");

  switch(parts[0]){

    case "fd":
      move(parseFloat(parts[1]));
      break;

    case "bk":
      move(-parseFloat(parts[1]));
      break;

    case "rt":
      angle += parseFloat(parts[1]);
      break;

    case "lt":
      angle -= parseFloat(parts[1]);
      break;

    case "pu":
      pen = false;
      break;

    case "pd":
      pen = true;
      break;

    case "home":
      x = canvas.width/2;
      y = canvas.height/2;
      angle = 0;
      break;

    case "clear":
      ctx.clearRect(0,0,canvas.width,canvas.height);
      break;

    default:
      addLine("unknown command");
  }
}

// REPEAT PARSER
function execute(input){
  addLine("> " + input);

  if(input.startsWith("repeat")){
    const match = input.match(/repeat (\\d+) \\[(.*)\\]/);
    if(match){
      const count = parseInt(match[1]);
      const commands = match[2].split(/(?=fd|bk|rt|lt|pu|pd)/);

      for(let i=0;i<count;i++){
        commands.forEach(c=>{
          executeCommand(c.trim());
        });
      }
      return;
    }
  }

  executeCommand(input);
}

// INPUT
input.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    execute(input.value.toLowerCase().trim());
    input.value="";
  }
});

// BOOT
addLine("ONN LOGO ENGINE READY");
addLine("type commands to draw");
</script>

</body>
</html>
