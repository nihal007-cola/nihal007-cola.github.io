<!DOCTYPE html>
<html>
<head>
  <title>MSW CONSOLE</title>
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.08;
    }

    .wrapper {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    .left {
      flex: 2;
      display: flex;
      flex-direction: column;
    }

    .console {
      flex: 1;
      border: 1px solid rgba(0,255,100,0.3);
      padding: 15px;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(0,255,100,0.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .line {
      font-size: 13px;
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    input {
      margin-top: auto;
      padding: 12px;
      background: black;
      border: 1px solid #33ff99;
      color: #33ff99;
      font-family: monospace;
      outline: none;
    }

    .right {
      flex: 1;
      border: 1px solid rgba(0,255,100,0.3);
      padding: 15px;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(0,255,100,0.1);
      overflow-y: auto;
    }

    .hint {
      font-size: 13px;
      margin-bottom: 10px;
      border-left: 2px solid #33ff99;
      padding-left: 8px;
      opacity: 0.85;
    }

    a {
      color: #33ff99;
      text-decoration: none;
      margin-bottom: 10px;
      display: inline-block;
    }

    @media(max-width:800px){
      .wrapper{flex-direction:column;}
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="wrapper">

  <div class="left">
    <a href="toys.html">← BACK</a>
    <h2>> MSW CONSOLE</h2>

    <div class="console" id="console"></div>
    <input id="cmd" placeholder="type command..." autofocus>
  </div>

  <div class="right">
    <div class="hint">square → draw square</div>
    <div class="hint">circle → draw circle</div>
    <div class="hint">line → draw line</div>
    <div class="hint">onn → print ONN</div>
    <div class="hint">clear → clear screen</div>
    <div class="hint">help → show commands</div>
  </div>

</div>

<script>
// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);


// CONSOLE
const input = document.getElementById("cmd");
const consoleBox = document.getElementById("console");

function addLine(text){
  const div = document.createElement("div");
  div.className = "line";
  consoleBox.appendChild(div);

  let i = 0;
  function type(){
    if(i < text.length){
      div.textContent += text[i];
      i++;
      setTimeout(type, 10);
    }
  }
  type();

  consoleBox.scrollTop = consoleBox.scrollHeight;
}


// COMMANDS
function execute(cmd){
  addLine("> " + cmd);

  switch(cmd){

    case "square":
      ctx.strokeStyle="#00ff88";
      ctx.strokeRect(200,150,200,200);
      addLine("drawing square...");
      break;

    case "circle":
      ctx.beginPath();
      ctx.arc(400,300,100,0,Math.PI*2);
      ctx.strokeStyle="#00ff88";
      ctx.stroke();
      addLine("drawing circle...");
      break;

    case "line":
      ctx.beginPath();
      ctx.moveTo(100,100);
      ctx.lineTo(500,400);
      ctx.strokeStyle="#00ff88";
      ctx.stroke();
      addLine("drawing line...");
      break;

    case "onn":
      ctx.font="60px monospace";
      ctx.fillStyle="#00ff88";
      ctx.fillText("ONN",300,300);
      addLine("rendering ONN...");
      break;

    case "clear":
      ctx.clearRect(0,0,canvas.width,canvas.height);
      consoleBox.innerHTML="";
      break;

    case "help":
      addLine("available commands:");
      addLine("square, circle, line, onn, clear");
      break;

    default:
      addLine("unknown command");
  }
}


// INPUT
input.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const cmd = input.value.trim().toLowerCase();
    execute(cmd);
    input.value="";
  }
});


// BOOT MESSAGE
addLine("MSW CONSOLE INITIALIZED");
addLine("type 'help' to begin");
</script>

</body>
</html>
